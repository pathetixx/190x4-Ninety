name: Build Ninety

on:
  push:
    # Билдим только на push alpha-тегов. Раньше слушали и branches: [main] —
    # каждый релизный пуш (git push origin main --tags) триггерил 2 параллельных
    # билда на одном SHA. main-билд "для проверки" был фиктивным: шёл параллельно
    # с tag-билдом, а не до него — ничего не защищал. Для ad-hoc проверки без
    # тега есть workflow_dispatch.
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

# Push в main + tag для одного SHA триггерят два run'а параллельно.
# Они дерутся за один cache-key Swatinem/rust-cache и второй падает на
# "Restoring cache...". Очередь по SHA решает без cancel/rerun вручную.
concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: false

      - name: Install npm deps
        run: npm install

      - name: Build sing-box from source (hiddify fork — tls_tricks, xhttp)
        shell: pwsh
        run: |
          $tag = "v1.13.0.h5"
          # Пин на конкретный commit: теги на GitHub перемещаемы. Бинарь идёт в
          # подписанный инсталлятор и исполняется под LocalSystem — supply-chain
          # критичен. Если апстрим переместит тег, SHA не сойдётся и сборка упадёт.
          $pinnedSha = "9b6b004adfb079db2134b682f9b4ff42434c2f38"
          $tags = "with_gvisor,with_quic,with_dhcp,with_wireguard,with_utls,with_acme,with_clash_api,with_tailscale,with_ccm,with_ocm,badlinkname,tfogo_checklinkname0,with_grpc,with_awg"
          Write-Host "Cloning hiddify-sing-box $tag…"
          git clone --depth 1 --branch $tag https://github.com/hiddify/hiddify-sing-box.git hsb
          if (-not $?) { Write-Error "git clone failed"; exit 1 }
          Push-Location hsb
          $head = (git rev-parse HEAD).Trim()
          if ($head -ne $pinnedSha) { Write-Error "hiddify-sing-box $tag = $head, ожидался $pinnedSha (тег перемещён?)"; exit 1 }
          Write-Host "Verified hiddify-sing-box commit $head."
          # Патч (после SHA-проверки, supply-chain аудит апстрима сохранён):
          # одиночный GET /proxies/{name}/delay (getProxyDelay) в апстреме меряет
          # через context.Background() → IsUnifiedDelayFromContext=false → один HEAD
          # с холодным dial+TLS вместо чистого второго RTT (завышение ~3x: список 30,
          # главная 100+). Флаг unified живёт в ctx (common/urltest/context.go) и
          # ставится в box.go:145 — но ПОСЛЕ создания clash-сервера (~box.go:138),
          # поэтому ни server.ctx, ни r.Context() его не несут (alpha52 на r.Context()
          # был холостым). Группа же работает: её g.ctx создаётся уже после box.go:145.
          # Фикс: явно навешиваем флаг на server.ctx (в нём box-сервисы: RootCAs/NTP),
          # как делает box.go. Одиночный замер перемеряет КАЖДЫЙ вызов (нет interval-
          # gate группы, которая молчит 600с) → пинг на главной живой И точный.
          $pf = "experimental/clashapi/proxies.go"
          $old = "ctx, cancel := context.WithTimeout(context.Background(), time.Millisecond*time.Duration(timeout))"
          $new = "ctx, cancel := context.WithTimeout(urltest.ContextWithIsUnifiedDelay(server.ctx), time.Millisecond*time.Duration(timeout))"
          $content = Get-Content $pf -Raw
          if ($content -notmatch [regex]::Escape($old)) { Write-Error "patch target not found in $pf (форк изменился — пересними патч)"; exit 1 }
          Set-Content $pf $content.Replace($old, $new) -NoNewline
          Write-Host "Patched getProxyDelay → unified delay на server.ctx."
          $env:GOTOOLCHAIN = "local"
          $env:CGO_ENABLED = "0"
          go build -trimpath -tags "$tags" -ldflags "-s -w -buildid= -checklinkname=0 -X internal/godebug.defaultGODEBUG=multipathtcp=0" -o sing-box.exe ./cmd/sing-box
          if (-not $?) { Write-Error "go build failed"; exit 1 }
          Pop-Location
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Copy-Item hsb/sing-box.exe "src-tauri/binaries/sing-box-x86_64-pc-windows-msvc.exe" -Force
          $size = (Get-Item "src-tauri/binaries/sing-box-x86_64-pc-windows-msvc.exe").Length
          Write-Host "Built hiddify-sing-box $tag ($([math]::Round($size/1MB,1)) MB)."

      - name: Build xray-core from source (two-core — xhttp)
        shell: pwsh
        run: |
          # xhttp в форке sing-box (packet-up) тащит только пинг; реальный поток
          # рассыпается. Эталон — xray-core, поэтому xhttp-ноды гоним через него
          # (two-core: sing-box → loopback socks-мост → xray). Тот же зрелый
          # xhttp, что в Throne; самый свежий тег, что собирается на Go 1.25
          # (v26.* требуют go 1.26). Чистый Go, статика, без cronet.
          $tag = "v25.12.8"
          $pinnedSha = "81f8f398c7b2b845853b1e85087c6122acc6db0b"
          Write-Host "Cloning Xray-core $tag…"
          git clone --depth 1 --branch $tag https://github.com/XTLS/Xray-core.git xray-core
          if (-not $?) { Write-Error "git clone xray failed"; exit 1 }
          Push-Location xray-core
          $head = (git rev-parse HEAD).Trim()
          if ($head -ne $pinnedSha) { Write-Error "Xray-core $tag = $head, ожидался $pinnedSha (тег перемещён?)"; exit 1 }
          Write-Host "Verified Xray-core commit $head."
          $env:GOTOOLCHAIN = "local"
          $env:CGO_ENABLED = "0"
          go build -trimpath -ldflags "-s -w -buildid=" -o xray.exe ./main
          if (-not $?) { Write-Error "xray build failed"; exit 1 }
          Pop-Location
          Copy-Item xray-core/xray.exe "src-tauri/binaries/xray-x86_64-pc-windows-msvc.exe" -Force
          $size = (Get-Item "src-tauri/binaries/xray-x86_64-pc-windows-msvc.exe").Length
          Write-Host "Built Xray-core $tag ($([math]::Round($size/1MB,1)) MB)."

      - name: Download wintun.dll
        shell: pwsh
        run: |
          # Wintun — BSD-licensed user-mode driver от WireGuard. Нужен sing-box.exe
          # для TUN-инбаунда (с alpha55 sing-box поднимает TUN сам, как child
          # элевированного Ninety — Throne-style). DLL кладётся рядом с Ninety.exe
          # = рядом с sing-box.exe в install dir, sing-box грузит её по имени.
          $url = "https://www.wintun.net/builds/wintun-0.14.1.zip"
          $expectedSha = "07c256185d6ee3652e09fa55c0b673e2624b565e02c4b9091c79ca7d2f24ef51"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile wintun.zip -UseBasicParsing
          # wintun.dll грузится сервисом под LocalSystem — проверяем целостность
          # загрузки (wintun.net без подписи артефакта, поэтому пин по sha256).
          $sha = (Get-FileHash wintun.zip -Algorithm SHA256).Hash.ToLower()
          if ($sha -ne $expectedSha) { Write-Error "wintun.zip sha256 = $sha, ожидался $expectedSha"; exit 1 }
          Write-Host "Verified wintun.zip sha256."
          Expand-Archive -Path wintun.zip -DestinationPath wintun -Force
          $src = "wintun/wintun/bin/amd64/wintun.dll"
          if (-not (Test-Path $src)) { Write-Error "wintun.dll не найден после распаковки"; exit 1 }
          Copy-Item $src "src-tauri/binaries/wintun.dll" -Force
          $size = (Get-Item "src-tauri/binaries/wintun.dll").Length
          Write-Host "wintun.dll bundled ($([math]::Round($size/1KB,1)) KB)."

      - name: Generate build-info (паспорт сборки для «О программе»)
        shell: pwsh
        run: |
          # Запекаем реальные commit/date/version в src/lib/build-info.js ПЕРЕД
          # сборкой (frontendDist=../src, бандлера нет → файл едет как есть).
          # core/channel/platform НЕ трогаем — они единственным источником живут
          # в самом build-info.js (core версионируется рядом с пином sing-box).
          $sha = (git rev-parse --short HEAD).Trim()
          $date = (Get-Date).ToUniversalTime().ToString("dd.MM.yyyy")
          $cfg = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $ver = $cfg.version
          $f = "src/lib/build-info.js"
          $c = Get-Content $f -Raw
          $c = $c -replace 'commit:\s*"[^"]*"', "commit: `"$sha`""
          $c = $c -replace 'date:\s*"[^"]*"', "date: `"$date`""
          $c = $c -replace 'version:\s*"[^"]*"', "version: `"$ver`""
          Set-Content $f $c -NoNewline
          Write-Host "build-info: version=$ver commit=$sha date=$date"

      - name: Build Tauri
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Generate latest.json (only on tag)
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $cfg = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $version = $cfg.version
          $tag = "${{ github.ref_name }}"
          $nsis = Get-ChildItem src-tauri/target/release/bundle/nsis/*-setup.exe | Select-Object -First 1
          if (-not $nsis) { Write-Error "NSIS setup not found"; exit 1 }
          $sigPath = "$($nsis.FullName).sig"
          if (-not (Test-Path $sigPath)) { Write-Error "Signature not found: $sigPath"; exit 1 }
          $sig = (Get-Content $sigPath -Raw).Trim()
          $url = "https://github.com/pathetixx/190x4-Ninety/releases/download/$tag/$($nsis.Name)"
          # Тянем body релиза — для нормальных changelog'ов в кастомной модалке.
          # ВАЖНО: gh выводит body построчно → PowerShell делает массив строк,
          # ConvertTo-Json потом сериализует массив. Tauri updater ждёт строку,
          # иначе latest.json парсится как "обновлений нет". -join "`n" склеивает.
          $notes = ""
          try {
            $raw = gh release view $tag --json body --jq .body 2>$null
            if ($LASTEXITCODE -eq 0) {
              if ($raw -is [array]) { $notes = ($raw -join "`n") } else { $notes = [string]$raw }
            }
          } catch { $notes = "" }
          # gh release view exit-code не должен валить весь шаг, если релиз
          # ещё не создан (мы делаем `gh release create` отдельно или через softprops).
          $global:LASTEXITCODE = 0
          if ([string]::IsNullOrWhiteSpace($notes)) { $notes = "Заметки релиза недоступны." }
          $json = [ordered]@{
            version = $version
            notes = $notes
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url = $url
              }
            }
          } | ConvertTo-Json -Depth 5
          Set-Content -Path latest.json -Value $json -Encoding UTF8
          Write-Host "=== latest.json ==="
          Get-Content latest.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ninety-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
          if-no-files-found: error
          retention-days: 14

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          name: Ninety ${{ github.ref_name }}
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
            latest.json
          fail_on_unmatched_files: true
          # prerelease ОБЯЗАН быть false: updater-эндпоинт — releases/latest/
          # download/latest.json (GitHub-редирект на "Latest"), а GitHub
          # исключает prerelease из "Latest". prerelease:true → /latest/ отдаст
          # старый latest.json → OTA сломается. "alpha"-статус держим в названии
          # релиза/заметках, а не во флаге. Схема тегов — semver vX.Y.Z.
          prerelease: false
          make_latest: "true"
