name: Build Ninety

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm deps
        run: npm install

      - name: Download sing-box (windows-amd64)
        shell: pwsh
        run: |
          $version = "1.13.12"
          $url = "https://github.com/SagerNet/sing-box/releases/download/v$version/sing-box-$version-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile sb.zip
          Expand-Archive -Path sb.zip -DestinationPath sb -Force
          $exe = Get-ChildItem -Path sb -Recurse -Filter "sing-box.exe" | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Copy-Item $exe.FullName "src-tauri/binaries/sing-box-x86_64-pc-windows-msvc.exe" -Force
          Write-Host "sing-box.exe placed."

      - name: Build Tauri
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Generate latest.json (only on tag)
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $cfg = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $version = $cfg.version
          $tag = "${{ github.ref_name }}"
          $nsis = Get-ChildItem src-tauri/target/release/bundle/nsis/*-setup.exe | Select-Object -First 1
          if (-not $nsis) { Write-Error "NSIS setup not found"; exit 1 }
          $sigPath = "$($nsis.FullName).sig"
          if (-not (Test-Path $sigPath)) { Write-Error "Signature not found: $sigPath"; exit 1 }
          $sig = (Get-Content $sigPath -Raw).Trim()
          $url = "https://github.com/pathetixx/190x4-Ninety/releases/download/$tag/$($nsis.Name)"
          # Тянем body релиза — для нормальных changelog'ов в кастомной модалке.
          # ВАЖНО: gh выводит body построчно → PowerShell делает массив строк,
          # ConvertTo-Json потом сериализует массив. Tauri updater ждёт строку,
          # иначе latest.json парсится как "обновлений нет". -join "`n" склеивает.
          $notes = ""
          try {
            $raw = gh release view $tag --json body --jq .body 2>$null
            if ($raw -is [array]) { $notes = ($raw -join "`n") } else { $notes = [string]$raw }
          } catch { $notes = "" }
          if ([string]::IsNullOrWhiteSpace($notes)) { $notes = "Заметки релиза недоступны." }
          $json = [ordered]@{
            version = $version
            notes = $notes
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url = $url
              }
            }
          } | ConvertTo-Json -Depth 5
          Set-Content -Path latest.json -Value $json -Encoding UTF8
          Write-Host "=== latest.json ==="
          Get-Content latest.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ninety-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
          if-no-files-found: error
          retention-days: 14

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
            latest.json
          fail_on_unmatched_files: true
          prerelease: false
          make_latest: "true"
